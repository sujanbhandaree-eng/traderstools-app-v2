name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Build Frontend Application
        run: npm run build
        env:
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_SYNTHETIC_KEEL_408018 }}'
          projectId: synthetic-keel-408018
          channelId: live

      - name: Authenticate Google Cloud for Functions
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_SYNTHETIC_KEEL_408018 }}'
          
      - name: Deploy Firebase Functions
        run: |
          cd functions
          npm install
          echo "GEMINI_API_KEY=${{ secrets.VITE_GEMINI_API_KEY }}" > .env
          npm install -g firebase-tools
          firebase deploy --only functions --project synthetic-keel-408018
